<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProjectOS — Asisten Project Digital</title>
<style>
  :root{--ind:#6366F1;--ind-d:#4F46E5;--ind-l:#EEF0FF;--ind-l2:#F5F6FF;
    --tl:#14B8A6;--tl-l:#CCFBF1;--sky:#0EA5E9;--violet:#8B5CF6;--emerald:#22C55E;--amber:#F59E0B;--pink:#EC4899;--rose:#F43F5E;--lime:#84CC16;
    --ink:#1E1B4B;--ink2:#3B3768;--muted:#6B6796;--faint:#A5A1C4;--bg:#FFFFFF;--bg2:#F4F3FF;--card:#FFFFFF;--line:#ECEBFB;--line2:#DEDCF5;
    --ok:#22C55E;--warn:#F59E0B;--r:18px;--sans:'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;}
  *{box-sizing:border-box}html,body{margin:0;padding:0}
  body{font-family:var(--sans);color:var(--ink);font-size:14.5px;line-height:1.55;
    background:
      radial-gradient(900px 500px at 8% -5%,#E0E7FF 0%,transparent 55%),
      radial-gradient(800px 500px at 100% 0%,#FCE7F3 0%,transparent 50%),
      radial-gradient(700px 600px at 100% 100%,#CCFBF1 0%,transparent 55%),
      radial-gradient(700px 500px at 0% 100%,#FEF3C7 0%,transparent 55%),
      #F4F3FF;
    background-attachment:fixed;}
  h1,h2,h3,h4{margin:0;font-weight:700;line-height:1.25;letter-spacing:-.02em}
  button{font-family:inherit;cursor:pointer}a{color:inherit}
  input,textarea,select{font-family:inherit;font-size:14px;width:100%;padding:9px 12px;border:1.5px solid var(--line2);border-radius:12px;background:#fff;color:var(--ink);transition:.18s}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--ind);box-shadow:0 0 0 4px var(--ind-l)}
  textarea{resize:vertical;min-height:60px}
  label.fl{display:block;font-size:12px;font-weight:700;color:var(--muted);margin:0 0 5px}
  .ico{width:16px;height:16px;display:inline-block;flex-shrink:0;vertical-align:-2px}

  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @keyframes pop{0%{transform:scale(.9);opacity:0}60%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  @keyframes sheen{0%{left:-60%}60%,100%{left:120%}}
  @keyframes popIn{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}

  .shell{display:flex;min-height:100vh}
  .side{width:230px;flex-shrink:0;background:rgba(255,255,255,.75);backdrop-filter:blur(14px);border-right:1px solid var(--line);padding:18px 14px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:5px}
  .brand{display:flex;align-items:center;gap:11px;padding:6px 8px 18px}
  .brand .lg{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--violet),var(--ind) 45%,var(--sky));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;box-shadow:0 6px 16px rgba(99,102,241,.4);animation:floaty 4s ease-in-out infinite}
  .brand .nm{font-weight:800;font-size:16px;letter-spacing:-.03em;background:linear-gradient(90deg,var(--violet),var(--ind),var(--sky));-webkit-background-clip:text;background-clip:text;color:transparent}
  .brand .sub{font-size:11px;color:var(--faint);margin-top:1px}
  .nav{border:none;background:transparent;width:100%;text-align:left;padding:10px 11px;border-radius:12px;font-size:14px;font-weight:600;color:var(--ink2);display:flex;align-items:center;gap:11px;transition:.18s}
  .nav:hover{background:#fff;transform:translateX(3px)}
  .nav.on{background:linear-gradient(135deg,var(--ind),var(--violet));color:#fff;box-shadow:0 8px 18px rgba(99,102,241,.35)}
  .nav .ico{color:var(--muted);transition:.18s}.nav.on .ico{color:#fff}.side .sp{flex:1}
  .main{flex:1;min-width:0;padding:28px 32px 70px;max-width:1140px;margin:0 auto;width:100%}
  @media(max-width:820px){.side{width:58px}.side .nm,.side .sub,.nav span{display:none}.brand{justify-content:center;padding:6px 0 16px}.main{padding:18px 14px 60px}}

  .ph{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-start;justify-content:space-between;margin-bottom:20px;animation:fadeUp .5s ease both}
  .ph h1{font-size:25px;background:linear-gradient(90deg,var(--ink),var(--ind));-webkit-background-clip:text;background-clip:text;color:transparent}
  .ph p{margin:4px 0 0;color:var(--muted);font-size:13.5px}
  .btn{border:1.5px solid var(--line2);background:#fff;color:var(--ink);padding:9px 15px;border-radius:12px;font-size:13.5px;font-weight:700;display:inline-flex;align-items:center;gap:7px;transition:.18s}
  .btn:hover{border-color:var(--ind);color:var(--ind);transform:translateY(-2px);box-shadow:0 8px 18px rgba(99,102,241,.18)}
  .btn.pri{background:linear-gradient(135deg,var(--ind),var(--violet));color:#fff;border-color:transparent;box-shadow:0 8px 18px rgba(99,102,241,.35)}
  .btn.pri:hover{filter:brightness(1.05);transform:translateY(-2px) scale(1.02)}
  .btn.tl{background:linear-gradient(135deg,var(--tl),var(--emerald));color:#fff;border-color:transparent;box-shadow:0 8px 18px rgba(20,184,166,.3)}
  .btn.tl:hover{filter:brightness(1.05)}
  .btn.sm{padding:7px 12px;font-size:12.5px;border-radius:10px}
  .btn.gh{background:transparent;border-color:transparent;color:var(--muted);box-shadow:none}.btn.gh:hover{background:#fff;color:var(--ind)}
  .btn[disabled]{opacity:.45;cursor:not-allowed;filter:grayscale(.3)}.btn[disabled]:hover{transform:none;box-shadow:none;border-color:var(--line2);color:var(--ink)}

  .stats{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:20px}
  .card{background:var(--bg);border:1px solid var(--line);border-radius:var(--r);padding:17px 19px;box-shadow:0 2px 10px rgba(80,70,180,.05)}
  .stats>.card{color:#fff;border:none;position:relative;overflow:hidden;animation:pop .5s ease both;transition:.2s}
  .stats>.card:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 16px 30px rgba(80,70,180,.28)}
  .stats>.card:nth-child(1){background:linear-gradient(135deg,#6366F1,#8B5CF6)}
  .stats>.card:nth-child(2){background:linear-gradient(135deg,#0EA5E9,#22C55E)}
  .stats>.card:nth-child(3){background:linear-gradient(135deg,#F59E0B,#F43F5E)}
  .stats>.card:nth-child(4){background:linear-gradient(135deg,#EC4899,#8B5CF6)}
  .stats>.card:nth-child(2){animation-delay:.06s}.stats>.card:nth-child(3){animation-delay:.12s}.stats>.card:nth-child(4){animation-delay:.18s}
  .stat{padding:15px 17px}
  .stat .lb{font-size:11.5px;color:rgba(255,255,255,.9);font-weight:700;display:flex;align-items:center;gap:7px}
  .stat .vl{font-size:22px;font-weight:800;margin-top:6px;line-height:1.15;color:#fff}
  .stat .mt{font-size:11px;color:rgba(255,255,255,.8);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .stat .ico{width:15px;height:15px;color:#fff}

  .cols{display:grid;grid-template-columns:1.5fr 1fr;gap:20px;align-items:start}@media(max-width:900px){.cols{grid-template-columns:1fr}}
  .sec-t{font-size:12.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:8px 2px 12px;display:flex;align-items:center;gap:8px}

  .ev{background:var(--bg);border:1px solid var(--line);border-left:5px solid var(--ac,var(--ind));border-radius:var(--r);padding:16px 18px;margin-bottom:13px;box-shadow:0 3px 12px rgba(80,70,180,.06);animation:fadeUp .45s ease both;transition:.2s}
  .ev:hover{transform:translateY(-3px);box-shadow:0 16px 30px rgba(80,70,180,.16);border-left-width:8px}
  .ev:nth-child(2){animation-delay:.05s}.ev:nth-child(3){animation-delay:.1s}.ev:nth-child(4){animation-delay:.15s}.ev:nth-child(5){animation-delay:.2s}.ev:nth-child(6){animation-delay:.25s}
  .ev .top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .ev .jd{font-size:16.5px;font-weight:750}.ev .jn{font-size:12px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .pill{font-size:11px;font-weight:800;padding:4px 12px;border-radius:20px;white-space:nowrap}
  .pchip{font-size:11px;font-weight:700;padding:3px 10px;border-radius:8px;background:var(--bg2);color:var(--ink2)}
  .bar{height:9px;border-radius:8px;background:#EEEDFB;overflow:hidden;margin-top:13px;position:relative}
  .bar>i{display:block;height:100%;border-radius:8px;background:linear-gradient(90deg,var(--ind),var(--violet),var(--pink));background-size:200% 100%;animation:shimmer 2.4s linear infinite;transition:width .6s cubic-bezier(.2,.8,.2,1)}
  .ev .foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;font-size:12px;color:var(--muted)}
  .cd{font-weight:800;color:var(--ink)}.cd.soon{color:var(--warn)}.cd.today{color:var(--ok)}
  .empty{color:var(--faint);font-style:italic}
  .mini{border:none;background:transparent;color:var(--faint);padding:6px;border-radius:9px;transition:.15s}.mini:hover{color:var(--ind);background:var(--ind-l);transform:scale(1.1)}.mini.dgr:hover{color:#EF4444;background:#FEE2E2}

  .cal{animation:fadeUp .5s ease both}
  .cal .hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .cal .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .cal .dow{font-size:10.5px;color:var(--faint);text-align:center;font-weight:800;padding:2px 0}
  .cal .cell{aspect-ratio:1;border-radius:10px;font-size:12px;display:flex;align-items:center;justify-content:center;color:var(--ink2);position:relative;transition:.15s}
  .cal .cell:hover{background:var(--ind-l)}
  .cal .cell.mut{color:var(--faint)}.cal .cell.tdy{background:linear-gradient(135deg,var(--ind),var(--violet));color:#fff;font-weight:800;box-shadow:0 4px 10px rgba(99,102,241,.4)}
  .cal .cell .dot{width:6px;height:6px;border-radius:50%;background:var(--pink);position:absolute;bottom:5px}
  .cal .cell.tdy .dot{background:#fff}
  .today-list{margin:0;padding:0}.today-list li{list-style:none;padding:9px 0;border-bottom:1px dashed var(--line);font-size:13.5px;display:flex;gap:9px;align-items:center;animation:fadeUp .4s ease both}
  .today-list li .ico{color:var(--pink)}

  .wz-top{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .stepper{display:flex;gap:7px;flex-wrap:wrap;margin:16px 0 22px}
  .step{border:1.5px solid var(--line2);background:#fff;border-radius:22px;padding:8px 14px;font-size:12.5px;font-weight:700;color:var(--muted);display:inline-flex;align-items:center;gap:7px;transition:.18s;animation:pop .4s ease both}
  .step:not(.lock):hover{transform:translateY(-2px);border-color:var(--ind);color:var(--ind)}
  .step .n{width:20px;height:20px;border-radius:50%;background:var(--bg2);color:var(--muted);font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:800;transition:.18s}
  .step.on{border-color:transparent;background:linear-gradient(135deg,var(--ind),var(--violet));color:#fff;box-shadow:0 8px 16px rgba(99,102,241,.35)}.step.on .n{background:rgba(255,255,255,.25);color:#fff}
  .step.done{border-color:#BBF7D0;background:#F0FDF4;color:#15803D}.step.done .n{background:linear-gradient(135deg,var(--emerald),var(--tl));color:#fff}
  .step.lock{opacity:.5;cursor:not-allowed}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:640px){.grid2{grid-template-columns:1fr}}
  .field{margin-bottom:14px}
  .wz-nav{display:flex;justify-content:space-between;gap:10px;margin-top:22px;align-items:flex-start}
  .needhint{font-size:12px;color:var(--warn);margin-top:7px;text-align:right;max-width:330px;font-weight:600}
  .tblscroll{overflow-x:auto}.rows{display:flex;flex-direction:column;gap:8px;min-width:max-content}
  .row{display:grid;gap:8px;align-items:center}.row.hdr-row{font-size:11px;color:var(--muted);font-weight:800}
  .row .no{font-size:12.5px;color:var(--muted);text-align:center;font-weight:700}
  .row .del{border:1.5px solid var(--line);background:#fff;color:var(--faint);width:34px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;transition:.15s}
  .row .del:hover{color:#EF4444;border-color:#FCA5A5;transform:scale(1.05)}
  .addbtn{align-self:flex-start;border:1.5px dashed var(--line2);background:var(--ind-l2);color:var(--ind);padding:9px 14px;border-radius:11px;font-size:13px;font-weight:700;display:inline-flex;gap:6px;align-items:center;margin-top:10px;transition:.18s}
  .addbtn:hover{border-color:var(--ind);background:var(--ind-l);transform:translateY(-1px)}
  .jenis-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(114px,1fr));gap:10px}
  .jt{border:1.5px solid var(--line2);background:#fff;border-radius:14px;padding:14px 8px;text-align:center;font-size:12.5px;font-weight:700;color:var(--ink2);transition:.18s}
  .jt:hover{transform:translateY(-3px);border-color:var(--jc,var(--ind));color:var(--jc,var(--ind));box-shadow:0 10px 20px rgba(80,70,180,.14)}
  .jt.on{border-color:transparent;background:var(--jc,var(--ind));color:#fff;box-shadow:0 10px 20px rgba(80,70,180,.28)}.jt.on span{color:#fff !important}
  .jt .ico{display:block;margin:0 auto 6px;width:22px;height:22px}
  .opts{display:flex;flex-wrap:wrap;gap:14px;margin:4px 0 12px;align-items:center}
  .opt{display:flex;gap:7px;align-items:center;font-size:13px;color:var(--ink2);font-weight:600}.opt input{width:auto}
  .recap{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px}@media(max-width:640px){.recap{grid-template-columns:1fr}}
  .recap .box{border:1px solid var(--line);border-radius:14px;padding:14px 16px;background:linear-gradient(180deg,#fff,#FBFAFF)}
  .recap .box:first-child{border-top:4px solid var(--sky)}.recap .box:last-child{border-top:4px solid var(--pink)}
  .recap h4{font-size:13px;margin-bottom:9px;display:flex;align-items:center;gap:7px}
  .recap ul{margin:0;padding-left:16px;font-size:13px}.recap li{margin-bottom:5px}
  .stars{color:#F59E0B;letter-spacing:2px;font-size:14px}
  .docnav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .dchip{border:1.5px solid var(--line2);background:#fff;padding:9px 14px;border-radius:12px;font-size:13px;font-weight:700;color:var(--muted);transition:.16s}
  .dchip:hover{transform:translateY(-2px);color:var(--ind);border-color:var(--ind)}
  .dchip.on{border-color:transparent;color:#fff;background:linear-gradient(135deg,var(--ind),var(--violet));box-shadow:0 8px 16px rgba(99,102,241,.3)}
  .paper{background:#fff;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:0 6px 20px rgba(80,70,180,.08);animation:fadeUp .45s ease both}
  .pbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--line);background:linear-gradient(90deg,#F5F6FF,#FFF7FB)}
  .pbar .t{font-weight:750;font-size:14px;display:flex;align-items:center;gap:8px}
  .sheet{padding:34px 40px;max-width:760px;margin:0 auto}@media(max-width:640px){.sheet{padding:20px 16px}}
  .sheet h2.dt{font-size:22px;text-align:center;margin-bottom:2px}.sheet .ds{text-align:center;color:var(--muted);margin:0 0 20px;font-size:13.5px}
  .sheet h3.dh{font-size:14.5px;color:var(--ind);border-bottom:2px solid var(--ind-l);padding-bottom:5px;margin:20px 0 9px}
  .sheet p{margin:0 0 9px}.sheet ol,.sheet ul{margin:0 0 10px}
  .sheet table{width:100%;border-collapse:collapse;font-size:12.5px;margin:5px 0 11px}
  .sheet th,.sheet td{border:1px solid var(--line2);padding:6px 8px;text-align:left;vertical-align:top}
  .sheet th{background:var(--ind-l);color:var(--ind-d);font-weight:700}
  .sheet .kv{display:grid;grid-template-columns:140px 1fr;gap:2px 10px;font-size:13.5px;margin-bottom:6px}.sheet .kv .k{color:var(--muted)}
  .sheet .chk{list-style:none;padding:0;margin:0}.sheet .chk li{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px dashed var(--line)}
  .sheet .box{width:16px;height:16px;border:2px solid var(--line2);border-radius:4px;flex-shrink:0}
  .sig{display:flex;justify-content:space-between;margin-top:34px;gap:20px}.sig div{text-align:center;font-size:13px;flex:1}.sig .ln{margin-top:56px;border-top:1px solid var(--ink);padding-top:4px}
  .note{font-size:12.5px;color:var(--ink2);background:linear-gradient(90deg,#ECFDF5,#EFF6FF);border:1px solid #A7F3D0;border-radius:13px;padding:12px 15px;margin-bottom:15px;display:flex;gap:9px;align-items:flex-start;animation:fadeUp .4s ease both}.note .ico{color:var(--tl);margin-top:1px}
  .soon-box{background:#fff;border:1.5px dashed var(--line2);border-radius:var(--r);padding:32px;text-align:center;color:var(--muted);animation:pop .4s ease both}
  .foot{text-align:center;color:var(--faint);font-size:12px;margin-top:24px}
  @media print{.side,.wz-top,.stepper,.wz-nav,.docnav,.pbar,.note,.foot,.ph{display:none !important}body,.main{background:#fff}.main{max-width:none;padding:0}.paper{border:none;box-shadow:none;animation:none}.sheet{padding:0;max-width:none}tr{page-break-inside:avoid}.slidewrap .slide{page-break-after:always}}
  .slidewrap{display:flex;flex-direction:column;gap:14px;padding:20px}
  .slide{aspect-ratio:16/9;border:1px solid var(--line);border-radius:14px;padding:26px 30px;display:flex;flex-direction:column;justify-content:center;position:relative;box-shadow:0 6px 18px rgba(80,70,180,.1)}
  .slide.cv{background:linear-gradient(135deg,var(--ind),var(--violet),var(--pink));color:#fff}.slide.cv h2{color:#fff;font-size:26px}.slide.cv p{color:#EDE9FE;margin:6px 0 0}
  .slide h2{color:var(--ind-d);font-size:18px;margin-bottom:9px}.slide ul{margin:0;padding-left:20px}.slide li{margin-bottom:6px}
  .slide .sn{position:absolute;top:12px;right:16px;font-size:11px;color:var(--faint)}.slide.cv .sn{color:#DDD6FE}
  /* ===== decorative background ===== */
  body{position:relative}
  body::before{content:"";position:fixed;inset:0;z-index:-2;pointer-events:none;
    background:
      radial-gradient(560px 560px at 12% 16%,rgba(139,92,246,.22),transparent 60%),
      radial-gradient(560px 560px at 88% 10%,rgba(236,72,153,.20),transparent 60%),
      radial-gradient(680px 680px at 82% 92%,rgba(20,184,166,.22),transparent 60%),
      radial-gradient(560px 560px at 8% 94%,rgba(245,158,11,.20),transparent 60%);
    animation:blob 20s ease-in-out infinite alternate;}
  body::after{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.55;
    background-image:radial-gradient(rgba(99,102,241,.14) 1px,transparent 1px);background-size:22px 22px;}
  @keyframes blob{0%{transform:translate3d(0,0,0) scale(1)}100%{transform:translate3d(0,-20px,0) scale(1.06)}}

  /* ===== theme switcher ===== */
  .thlabel{font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;font-weight:800;padding:2px 10px 4px}
  .themebar{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--line);border-radius:13px;padding:4px}
  .tbtn{flex:1;border:none;background:transparent;color:var(--muted);padding:8px;border-radius:10px;display:flex;align-items:center;justify-content:center;transition:.16s}
  .tbtn:hover{color:var(--ind)}
  .tbtn.on{background:#fff;color:var(--ind);box-shadow:0 3px 8px rgba(80,70,180,.16)}
  @media(max-width:820px){.thlabel{display:none}.themebar{flex-direction:column}}

  /* ===== dark theme ===== */
  [data-theme="dark"]{--ink:#F2F1FB;--ink2:#CFCCEB;--muted:#9E9AC6;--faint:#6E6996;--bg:#211E38;--bg2:#181529;--card:#2A2647;--line:#2E2A4A;--line2:#3B3660;--ind-l:#2A2750;--ind-l2:#242143}
  [data-theme="dark"] body{background:radial-gradient(900px 500px at 8% -5%,#2A2352 0%,transparent 55%),radial-gradient(800px 500px at 100% 0%,#3A1E3C 0%,transparent 50%),radial-gradient(700px 600px at 100% 100%,#123A38 0%,transparent 55%),radial-gradient(700px 500px at 0% 100%,#3A2E12 0%,transparent 55%),#100E1F}
  [data-theme="dark"] body::after{opacity:.34;background-image:radial-gradient(rgba(255,255,255,.09) 1px,transparent 1px)}
  [data-theme="dark"] .side{background:rgba(24,21,41,.72)}
  [data-theme="dark"] input,[data-theme="dark"] textarea,[data-theme="dark"] select{background:#26223F;color:var(--ink);border-color:var(--line2)}
  [data-theme="dark"] .btn{background:#26223F;color:var(--ink);border-color:var(--line2)}
  [data-theme="dark"] .btn.gh{background:transparent;border-color:transparent}

/* ============ HELPERS ============ */
function esc(s){return(s==null?'':String(s)).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function icon(p){return'<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">'+p+'</svg>';}
function cur(){return state.events.find(function(e){return e.id===state.curId;});}
function filled(v){return v!=null&&String(v).trim()!=='';}
function norm(s){return(s||'').toString().toLowerCase().trim();}
function daysTo(d){if(!d)return null;var t=new Date();t.setHours(0,0,0,0);var x=new Date(d+'T00:00');return Math.round((x-t)/86400000);}
function fmtD(d,long){if(!d)return'';try{var x=new Date(d+'T00:00');return x.toLocaleDateString('id-ID',long?{weekday:'long',day:'numeric',month:'long',year:'numeric'}:{day:'numeric',month:'short',year:'numeric'});}catch(e){return d;}}
function tglTeks(e){var a=fmtD(e.tglMulai,1),b=fmtD(e.tglSelesai,1);if(a&&b&&a!==b)return a+' – '+b;return a||b||'(tanggal belum diisi)';}
function em(v){return v?esc(v):'<span class="empty">(belum diisi)</span>';}
function allActs(e){var a=[];e.hari.forEach(function(d,di){d.items.forEach(function(it){a.push({act:it,hari:d.tgl||('Hari '+(di+1)),di:di});});});return a;}
function jamRange(a){return (a.jamMulai||'')+(a.jamSelesai?' – '+a.jamSelesai:'');}
function panitiaNames(e){return e.panitia.filter(function(p){return filled(p.nama);}).map(function(p){return p.nama;});}
function seksiNames(e){var s=[],seen={};e.panitia.forEach(function(p){if(filled(p.seksi)&&!seen[norm(p.seksi)]){seen[norm(p.seksi)]=1;s.push(p.seksi);}});return s;}
function aggNeeds(e,key){var map={},order=[];allActs(e).forEach(function(w){(w.act[key]||[]).forEach(function(x){if(!filled(x.i))return;var k=norm(x.i);if(!map[k]){map[k]={i:x.i,kat:x.kat||'',rows:[]};order.push(k);}if(!map[k].kat&&x.kat)map[k].kat=x.kat;map[k].rows.push({act:w.act.nama||'(kegiatan)',q:x.q||'',pic:w.act.pic||''});});});return order.map(function(k){return map[k];});}

/* validation & progress */
function okIdentitas(e){return['jenis','lembaga','judul','tema','visi','misi','tujuan','deskripsi'].every(function(f){return filled(e[f]);});}
function okPanitia(e){return e.panitia.length>0&&e.panitia.every(function(p){return filled(p.seksi)&&filled(p.nama);});}
function okPelaksanaan(e){return['lokasi','alamat','tglMulai','tglSelesai','jamMulai','jamSelesai','targetPeserta'].every(function(f){return filled(e[f]);});}
function okRundown(e){return e.hari.length>0&&e.hari.every(function(d){return filled(d.tgl)&&d.items.length>0&&d.items.every(function(a){return filled(a.nama)&&filled(a.jamMulai)&&filled(a.pic);});});}
function okPeserta(e){if(!e.peserta.length)return false;return e.peserta.every(function(p){var ok=filled(p.n)&&filled(p.kl)&&filled(p.ktk);if(e.opsi.kamar)ok=ok&&filled(p.km);if(e.opsi.bus)ok=ok&&filled(p.bus)&&filled(p.pjbus);if(e.opsi.kelompok)ok=ok&&filled(p.kel);if(e.opsi.kamar||e.opsi.kelompok)ok=ok&&filled(p.mentor);return ok;});}
function stepComplete(e,i){return[okIdentitas,okPanitia,okPelaksanaan,okRundown,okPeserta,function(){return true;},function(){return true;},function(x){return x.vendor.length>0;}][i](e);}
function progress(e){if(e.status==='Belum dimulai')return 0;if(e.status==='Selesai')return 100;var c=0;for(var i=0;i<8;i++)if(stepComplete(e,i))c++;return Math.round(c/8*100);}
function gateDone(i){var e=cur();return[okIdentitas,okPanitia,okPelaksanaan,okRundown,okPeserta,function(){return true;},function(){return true;},function(){return true;}][i](e);}
function canGoto(i){if(state.demo)return true;for(var j=0;j<i;j++)if(!gateDone(j))return false;return true;}
function cdText(e){var d=daysTo(e.tglMulai);if(d==null)return{t:'Tanggal belum diatur',c:''};if(d>1)return{t:'H- '+d,c:d<=7?'soon':''};if(d===1)return{t:'Besok',c:'soon'};if(d===0)return{t:'Hari ini',c:'today'};return{t:Math.abs(d)+' hari lalu',c:''};}

function todoPanel(d){
  var out=[];
  d.terdekat.forEach(function(e){if(progress(e)<80){var miss=[];[0,1,2,3,4,7].forEach(function(i){if(!stepComplete(e,i))miss.push(STEPS[i][0]);});
    out.push({c:'#F59E0B',ic:'<path d="M12 8v4l3 2M12 3a9 9 0 100 18 9 9 0 000-18z"/>',t:esc(e.judul)+' · '+cdText(e).t,s:'Perlu diselesaikan: '+(miss.length?esc(miss.join(', ')):'finalisasi'),fn:"openEv('"+e.id+"')"});}});
  d.situ.forEach(function(e){out.push({c:'#EAB308',ic:'<path d="M13 2L3 14h7l-1 8 10-12h-7z"/>',t:esc(e.judul)+' (Situasional)',s:'Permintaan khusus pimpinan · '+cdText(e).t,fn:"openEv('"+e.id+"')"});});
  state.projects.forEach(function(p){
    if(p.status==='pending')out.push({c:'#F59E0B',ic:'<path d="M12 8v4l3 2M12 3a9 9 0 100 18 9 9 0 000-18z"/>',t:esc(p.name),s:'Dokumen rancang menunggu ACC kepala lembaga',fn:"openProj('"+p.id+"')"});
    if(p.status==='rejected')out.push({c:'#EF4444',ic:'<path d="M12 9v4M12 17h.01M10.3 3.3l-8 14A2 2 0 004 20h16a2 2 0 001.7-2.7l-8-14a2 2 0 00-3.4 0z"/>',t:esc(p.name),s:'Perlu revisi dokumen rancang',fn:"openProj('"+p.id+"')"});
    if(p.status==='selesai_pending')out.push({c:'#8B5CF6',ic:'<path d="M9 11l3 3 8-8"/>',t:esc(p.name),s:'Menunggu konfirmasi selesai dari kepala lembaga',fn:"openProj('"+p.id+"')"});
    if(p.status==='aktif'&&projWarn(p).n>0)out.push({c:'#EF4444',ic:'<path d="M12 9v4M12 17h.01M10.3 3.3l-8 14A2 2 0 004 20h16a2 2 0 001.7-2.7l-8-14a2 2 0 00-3.4 0z"/>',t:esc(p.name),s:projWarn(p).n+' fase lewat tenggat, jurnal belum diisi',fn:"openProj('"+p.id+"')"});
  });
  if(!out.length)return'<li class="empty">Tidak ada yang mendesak. Alhamdulillah, semua terkendali. 🌤️</li>';
  return out.map(function(o){return'<li onclick="'+o.fn+'" style="cursor:pointer"><span style="color:'+o.c+'">'+icon(o.ic)+'</span><span style="flex:1"><b>'+o.t+'</b><br><span style="color:var(--muted);font-size:12.5px">'+o.s+'</span></span></li>';}).join('');
}
function calMarks(y,mo){var marks={};
  function add(t){if(!t)return;var x=new Date(t+'T00:00');if(x.getFullYear()===y&&x.getMonth()===mo)marks[x.getDate()]=true;}
  state.events.filter(function(e){return e.ta===state.ta;}).forEach(function(e){add(e.tglMulai);add(e.tglSelesai);});
  state.projects.forEach(function(p){p.phases.forEach(function(f){add(f.mulai);add(f.selesai);});});
  return marks;}
function calendarHTML(){
  var d=state.cal,y=d.getFullYear(),mo=d.getMonth();
  var start=new Date(y,mo,1).getDay(),dim=new Date(y,mo+1,0).getDate();
  var today=new Date();today.setHours(0,0,0,0);var marks=calMarks(y,mo);
  var pad=function(n){return(n<10?'0':'')+n;};
  var h='<div class="hdr"><button class="mini" onclick="calMove(-1)">'+icon('<path d="M15 6l-6 6 6 6"/>')+'</button><b style="font-size:13.5px">'+d.toLocaleDateString('id-ID',{month:'long',year:'numeric'})+'</b><button class="mini" onclick="calMove(1)">'+icon('<path d="M9 6l6 6-6 6"/>')+'</button></div><div class="grid">';
  ['M','S','S','R','K','J','S'].forEach(function(x){h+='<div class="dow">'+x+'</div>';});
  var off=(start+6)%7;for(var i=0;i<off;i++)h+='<div class="cell mut"></div>';
  for(var dn=1;dn<=dim;dn++){var ds=y+'-'+pad(mo+1)+'-'+pad(dn);var isT=(y===today.getFullYear()&&mo===today.getMonth()&&dn===today.getDate());var sel=state.calSel===ds;
    h+='<div class="cell'+(isT?' tdy':'')+(sel?' sel':'')+(marks[dn]?' has':'')+'" onclick="calPick(\''+ds+'\')">'+dn+(marks[dn]?'<span class="dot"></span>':'')+'</div>';}
  return h+'</div>';
}
function calMove(n){state.cal=new Date(state.cal.getFullYear(),state.cal.getMonth()+n,1);render();}
function calPick(ds){state.calSel=state.calSel===ds?null:ds;render();}
function dayItems(ds){var out=[];
  state.events.filter(function(e){return e.ta===state.ta;}).forEach(function(e){
    if(e.tglMulai===ds)out.push({t:'Eventual',c:'#6366F1',name:e.judul||'(acara)',note:'Mulai',fn:"openEv('"+e.id+"')"});
    if(e.tglSelesai===ds&&e.tglSelesai!==e.tglMulai)out.push({t:'Eventual',c:'#6366F1',name:e.judul||'(acara)',note:'Selesai',fn:"openEv('"+e.id+"')"});});
  state.projects.forEach(function(p){p.phases.forEach(function(f,i){
    if(f.mulai===ds)out.push({t:'Strategis',c:'#8B5CF6',name:p.name||'(proyek)',note:'Mulai fase '+(i+1),fn:"openProj('"+p.id+"')"});
    if(f.selesai===ds)out.push({t:'Strategis',c:'#8B5CF6',name:p.name||'(proyek)',note:'Tenggat fase '+(i+1),fn:"openProj('"+p.id+"')"});});});
  return out;}
function calSelBox(){
  if(!state.calSel)return'';var items=dayItems(state.calSel);
  var h='<div class="card" style="margin-top:12px"><div style="font-weight:700;font-size:13px;margin-bottom:8px">'+icon('<rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18"/>')+esc(fmtD(state.calSel,1))+'</div>';
  if(!items.length)h+='<div class="empty" style="font-size:13px">Tidak ada agenda di tanggal ini.</div>';
  else h+='<ul class="today-list">'+items.map(function(o){return'<li onclick="'+o.fn+'" style="cursor:pointer"><span style="color:'+o.c+'">'+icon('<circle cx="12" cy="12" r="4"/>')+'</span><span style="flex:1"><b>'+esc(o.name)+'</b> <span class="pchip" style="background:'+o.c+'1f;color:'+o.c+'">'+o.t+'</span><br><span style="color:var(--muted);font-size:12.5px">'+esc(o.note)+'</span></span></li>';}).join('')+'</ul>';
  return h+'</div>';
}
/* ---- Project Eventual (sub-dashboard) ---- */
function goEventual(){state.view='eventual';state.evFilter='total';state.evAll=false;render();}
function setEvFilter(f){state.evFilter=f;state.evAll=false;render();}
function rankEv(e){var d=daysTo(e.tglMulai);if(d!=null&&d>=0&&d<=30)return 0;if(e.status==='Perencanaan')return 1;return 2;}
function statf(lb,ic,val,sub,filter,color){var on=state.evFilter===filter;return'<div class="card stat statf'+(on?' on':'')+'" style="--sc:'+color+'" onclick="setEvFilter(\''+filter+'\')"><div class="lb">'+icon(ic)+lb+'</div><div class="vl" style="color:'+color+'">'+val+'</div><div class="mt">'+esc(sub)+'</div></div>';}

  var d=evData();

    statf('Perencanaan','<path d="M4 6h16M4 12h16M4 18h10"/>',d.perencanaan.length,'sedang direncanakan','perencanaan','#0EA5E9')+
    statf('Situasional','<path d="M13 2L3 14h7l-1 8 10-12h-7z"/>',d.situ.length,'permintaan pimpinan','situasional','#EC4899')+'</div>';
  var list,title;

  else if(state.evFilter==='situasional'){list=d.situ.slice().sort(function(a,b){return keyd(a)-keyd(b);});title='Acara situasional';}
  else{list=d.non.slice().sort(function(a,b){var r=rankEv(a)-rankEv(b);return r!==0?r:keyd(a)-keyd(b);});title='Semua acara — terdekat di atas, belum mulai di bawah';}
  h+='<div class="sec-t">'+icon('<path d="M4 6h16M4 12h16M4 18h10"/>')+esc(title)+' ('+list.length+')</div>';

function viewArsip(){
  var h='<div class="ph"><div><h1>Bank Acara</h1><p>Kumpulan seluruh acara per tahun ajaran</p></div></div>';
  var byYear={};state.events.forEach(function(e){(byYear[e.ta]=byYear[e.ta]||[]).push(e);});
  var years=Object.keys(byYear).sort().reverse();
  if(!years.length){h+='<div class="soon-box">Belum ada acara.</div>';return h;}
  years.forEach(function(y){var list=byYear[y].slice().sort(function(a,b){return keyd(a)-keyd(b);});var done=list.filter(function(e){return e.status==='Selesai';}).length;
    h+='<div class="sec-t" style="margin-top:18px">'+icon('<rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/>')+'Tahun Ajaran '+esc(y)+' — '+list.length+' acara · '+done+' selesai</div>';
    list.forEach(function(e){h+=evCard(e);});});
  return h;
}

/* ============ VENDOR DB ============ */
function vendorList(){
  var map={};
  state.events.forEach(function(e){e.vendor.forEach(function(v){if(!filled(v.n)&&!filled(v.wa))return;var k=norm(v.n)+'|'+norm(v.wa);if(!map[k])map[k]={n:v.n,kat:v.kat,wa:v.wa,ket:v.ket,uses:0,key:k};map[k].uses++;if(!map[k].kat&&v.kat)map[k].kat=v.kat;});});
  return Object.keys(map).map(function(k){var o=map[k];o.meta=state.vendorMeta[k]||{rating:'',review:''};return o;});
}
function viewVendor(){
  state._vlist=vendorList();
  var byKat={};state._vlist.forEach(function(v){var k=v.kat||'Lainnya';(byKat[k]=byKat[k]||[]).push(v);});
  var h='<div class="ph"><div><h1>Bank Vendor</h1><p>Database vendor otomatis dari semua acara — beri rating &amp; ulasan</p></div></div>';
  h+='<div class="note">'+icon('<circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/>')+'<span>Vendor yang Anda masukkan di acara mana pun otomatis terkumpul di sini untuk dilacak.</span></div>';
  if(!state._vlist.length){h+='<div class="soon-box">Belum ada vendor.</div>';return h;}
  var groups='';
  Object.keys(byKat).sort().forEach(function(kat){groups+='<div class="sec-t" style="margin-top:18px">'+icon('<path d="M4 7h16M4 12h16M4 17h10"/>')+esc(kat)+'</div>';
    byKat[kat].forEach(function(v){var i=state._vlist.indexOf(v);var stars=v.meta.rating?'<span class="stars">'+'★'.repeat(+v.meta.rating)+'☆'.repeat(5-v.meta.rating)+'</span>':'<span class="empty">belum dinilai</span>';
      groups+='<div class="card" style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap"><div><div style="font-weight:650;font-size:15px">'+em(v.n)+'</div><div class="jn" style="margin-top:3px">'+icon('<path d="M5 4h4l2 5-3 2a11 11 0 005 5l2-3 5 2v4a2 2 0 01-2 2A16 16 0 013 6a2 2 0 012-2z"/>')+esc(v.wa||'-')+' · dipakai di '+v.uses+' acara</div>'+(v.ket?'<div class="jn" style="margin-top:2px">'+esc(v.ket)+'</div>':'')+'</div><div style="text-align:right"><div style="margin-bottom:6px">'+stars+'</div>'+(v.wa?'<button class="btn sm tl" onclick="waV('+i+')">'+icon('<path d="M5 4h4l2 5-3 2a11 11 0 005 5l2-3 5 2v4a2 2 0 01-2 2A16 16 0 013 6a2 2 0 012-2z"/>')+'Hubungi</button>':'')+'</div></div><div class="grid2" style="margin-top:12px"><div><label class="fl">Rating</label><select onchange="rateV('+i+',this.value)"><option value="">—</option>'+[1,2,3,4,5].map(function(n){return'<option value="'+n+'" '+(+v.meta.rating===n?'selected':'')+'>'+n+' ★</option>';}).join('')+'</select></div><div><label class="fl">Ulasan</label><input value="'+esc(v.meta.review)+'" placeholder="mis. tepat waktu" oninput="revV('+i+',this.value)"></div></div></div>';});});
  return h+groups;
}
function metaOf(i){var o=state._vlist[i];state.vendorMeta[o.key]=state.vendorMeta[o.key]||{rating:'',review:''};return state.vendorMeta[o.key];}
function rateV(i,v){metaOf(i).rating=v;render();}
function revV(i,v){metaOf(i).review=v;}
function waV(i){var o=state._vlist[i];waTo(o.wa,o.n,'','');}
function waTo(wa,name,lembaga,judul){if(!wa){alert('Nomor WhatsApp kosong.');return;}var num=String(wa).replace(/[^0-9]/g,'');if(num.charAt(0)==='0')num='62'+num.slice(1);var msg='Assalamualaikum '+(name||'')+', kami dari '+(lembaga||'panitia')+' ingin menanyakan ketersediaan'+(judul?' untuk acara '+judul:'')+'.';window.open('https://wa.me/'+num+'?text='+encodeURIComponent(msg),'_blank');}

/* ============ WIZARD ============ */
var STEPS=[['Identitas'],['Kepanitiaan'],['Pelaksanaan'],['Rundown'],['Peserta'],['Perlengkapan'],['Anggaran'],['Vendor'],['Dokumen']];
function needText(i){return['Lengkapi semua kolom identitas.','Isi minimal satu seksi + nama panitia.','Lengkapi semua kolom pelaksanaan.','Tiap hari perlu tanggal; tiap kegiatan perlu nama, jam mulai, & PIC.','Lengkapi data tiap peserta sesuai kolom yang aktif.','','','',''][i];}
var LOCK='<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 018 0v3"/></svg>';
function viewWizard(){
  var e=cur();if(!e){go('dashboard');return'';}
  if(e.status==='Selesai')return reviewMode(e);
  var tierBadge=e.tier?'<span class="pchip" style="background:'+(e.tier==='lengkap'?'#EDE9FE;color:#6D28D9':'#DCFCE7;color:#15803D')+'">Profil: '+(e.tier==='lengkap'?'Lengkap':'Ringkas')+'</span>':'';
  var h='<div class="wz-top"><button class="btn gh sm" onclick="go(\'dashboard\')">'+icon('<path d="M15 6l-6 6 6 6"/>')+'Dashboard</button></div>';
  h+='<div class="ph"><div><h1>'+em(e.judul||'Acara baru')+'</h1><p>'+(e.jenis?esc(e.jenis)+' · ':'')+'merancang acara · '+progress(e)+'% selesai '+tierBadge+'</p></div>'+
    '<select style="width:auto" onchange="upd(\'status\',this.value);render()">'+STATUS.map(function(s){return'<option '+(s===e.status?'selected':'')+'>'+s+'</option>';}).join('')+'</select></div>';
  h+='<div class="stepper">'+STEPS.map(function(s,i){var locked=!canGoto(i),done=i<8&&stepComplete(e,i);return'<button class="step'+(i===state.step?' on':'')+(done?' done':'')+(locked?' lock':'')+'" '+(locked?'disabled':'')+' onclick="gotoStep('+i+')"><span class="n">'+(locked?LOCK:(done?'✓':(i+1)))+'</span>'+s[0]+'</button>';}).join('')+'</div>';
  h+='<div id="stepbody">'+stepBody(e)+'</div>';
  var canNext=state.demo?true:gateDone(state.step),last=STEPS.length-1;
  h+='<div class="wz-nav"><button class="btn" '+(state.step===0?'style="visibility:hidden"':'')+' onclick="gotoStep('+(state.step-1)+')">'+icon('<path d="M15 6l-6 6 6 6"/>')+'Sebelumnya</button><div>';
  if(state.step<last){h+='<button class="btn pri" '+(canNext?'':'disabled')+' onclick="gotoStep('+(state.step+1)+')">Lanjut'+icon('<path d="M9 6l6 6-6 6"/>')+'</button>';if(!canNext)h+='<div class="needhint">'+needText(state.step)+'</div>';}
  else h+='<button class="btn tl" onclick="window.print()">'+icon('<path d="M6 9V3h12v6M6 18H4v-6h16v6h-2M8 14h8v7H8z"/>')+'Cetak dokumen aktif</button>';
  h+='</div></div>';return h;
}
function reviewMode(e){
  return '<div class="wz-top"><button class="btn gh sm" onclick="go(\'arsip\')">'+icon('<path d="M15 6l-6 6 6 6"/>')+'Arsip</button></div>'+

    '</div>';}
  else h+='<div class="note">'+icon('<circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/>')+'<span>Acara ringkas — cukup nama, kelas, dan kontak.</span></div>';
  h+=repeatTable('peserta',pcols(e),{num:true})+pesertaRecap(e)+'</div>';

function pesertaRecap(e){
  if(!(e.opsi.kamar||e.opsi.bus||e.opsi.kelompok))return'';
  function grp(field,label,extra){var g={};e.peserta.forEach(function(p){var k=p[field];if(!filled(k))return;(g[k]=g[k]||[]).push(p);});var keys=Object.keys(g).sort();if(!keys.length)return'';
    return'<div class="box"><h4>'+label+'</h4>'+keys.map(function(k){var mem=g[k];var ex=extra?(mem.find(function(p){return filled(p[extra.f]);})||{})[extra.f]:'';return'<div style="margin-bottom:6px"><b>'+esc(k)+'</b>'+(ex?' <span class="empty">('+esc(extra.l)+': '+esc(ex)+')</span>':'')+' — '+mem.length+' orang<div style="font-size:12px;color:var(--muted)">'+mem.map(function(p){return esc(p.n);}).join(', ')+'</div></div>';}).join('')+'</div>';}
  var boxes='';
  if(e.opsi.kamar)boxes+=grp('km','Per Kamar',{f:'mentor',l:'Mentor'});
  if(e.opsi.kelompok)boxes+=grp('kel','Per Kelompok',{f:'mentor',l:'Mentor'});
  if(e.opsi.bus)boxes+=grp('bus','Per Bus',{f:'pjbus',l:'PJ'});
  if(!boxes)return'';
  return'<div class="subttl" style="margin-top:18px">Rekap pengelompokan otomatis</div><div class="recap">'+boxes+'</div>';
}
function recapPerl(e){
  var perl=aggNeeds(e,'perlu');
  function pList(kat){var arr=perl.filter(function(x){return kat==='(lain)'?!x.kat:(x.kat||'')===kat;});return arr.length?arr.map(function(x){var tot=x.rows.map(function(r){return r.q;}).filter(filled).join(' + ');return'<li>'+em(x.i)+(tot?' — '+esc(tot):'')+' <span class="empty">('+x.rows.length+' kegiatan)</span></li>';}).join(''):'<li class="empty">belum ada</li>';}
  var lain=perl.filter(function(x){return !x.kat;});
  var h='<div class="note">'+icon('<circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/>')+'<span>Halaman ini <b>otomatis</b> merangkum kebutuhan tiap kegiatan di Rundown. Untuk menambah/mengubah, edit di langkah <b>Rundown</b>. Konsumsi cukup ditulis sebagai perlengkapan kategori Kelompok.</span></div>';
  h+='<div class="recap"><div class="box"><h4>'+icon('<path d="M12 3a4 4 0 100 8 4 4 0 000-8zM4 21v-2a6 6 0 0116 0v2"/>')+'Perlengkapan Pribadi</h4><ul>'+pList('Pribadi')+'</ul></div>'+
    '<div class="box"><h4>'+icon('<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>')+'Perlengkapan Kelompok</h4><ul>'+pList('Kelompok')+'</ul></div>'+
    '<div class="box"><h4>'+icon('<path d="M4 5h16v14H4zM4 9h16"/>')+'Perlengkapan Acara</h4><ul>'+pList('Acara')+'</ul></div></div>';
  if(lain.length)h+='<div class="box" style="margin-top:14px;border:1px solid var(--line);border-radius:14px;padding:14px 16px"><h4 class="subttl" style="margin-top:0">Belum dikategorikan</h4><ul>'+pList('(lain)')+'</ul></div>';
  return h;

}
function jEntry(j){
  var lamp=(j.lampiran||[]).filter(function(l){return filled(l.ket);}).map(function(l){return'<span class="lampchip">'+icon('<path d="M21 12l-9 9a5 5 0 01-7-7l9-9a3.5 3.5 0 015 5l-9 9"/>')+esc(l.tipe)+': '+esc(l.ket)+'</span>';}).join('');
  return'<div class="jentry"><div class="jd">'+icon('<rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/>')+esc(j.tanggal||'-')+(filled(j.progress)?' · '+esc(j.progress)+'%':'')+'</div>'+
    (filled(j.pencapaian)?'<div class="jrow"><b style="color:#16A34A">✅ Pencapaian:</b> '+esc(j.pencapaian)+'</div>':'')+
    (filled(j.kendala)?'<div class="jrow"><b style="color:#D97706">⚠️ Kendala:</b> '+esc(j.kendala)+'</div>':'')+
    (filled(j.solusi)?'<div class="jrow"><b style="color:#7C3AED">💡 Solusi:</b> '+esc(j.solusi)+'</div>':'')+
    (lamp?'<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">'+lamp+'</div>':'')+'</div>';
}
function phaseTimeline(p){
  var meta={upcoming:{c:'#94A1C4',t:'Belum mulai'},ongoing:{c:'#6366F1',t:'Berjalan'},lewat:{c:'#22C55E',t:'Terlewati (ada jurnal)'},overdue:{c:'#EF4444',t:'Lewat tenggat, belum ada jurnal'}};
  var h='<div class="card">';
  p.phases.forEach(function(f,i){var s=phaseState(p,f),m=meta[s];h+='<div class="phase-row"><span class="pdot" style="background:'+m.c+'"></span><div style="flex:1"><b>Fase '+(i+1)+': '+em(f.nama)+'</b><div style="font-size:12.5px;color:var(--muted)">'+esc(fmtD(f.mulai,1)||'?')+' – '+esc(fmtD(f.selesai,1)||'?')+(f.deskripsi?' · '+esc(f.deskripsi):'')+'</div></div><span class="pchip" style="background:'+m.c+'22;color:'+m.c+'">'+m.t+'</span></div>';});
  return h+'</div>';
}
function projSelesaiPending(p){
  var h=projSummaryHead(p);
  h+='<div class="note" style="background:#EDE9FE;border-color:#C4B5FD">'+icon('<path d="M12 8v4l3 2M12 3a9 9 0 100 18 9 9 0 000-18z"/>')+'<span>Koordinator menandai project ini <b>selesai</b>. Menunggu konfirmasi akhir dari kepala lembaga.</span></div>';
  h+=projTabs(p);
  if(state.projTab==='dokumen'){h+='<div class="paper"><div class="pbar"><span class="t">Nota Kesepakatan Project</span><button class="btn sm" onclick="window.print()">Cetak</button></div><div>'+projDoc(p)+'</div></div>';}
  else if(state.projTab==='fase'){h+=phaseTimeline(p);}
  else{h+='<div class="sec-t">Riwayat update ('+p.journal.length+')</div>';p.journal.forEach(function(j){h+=jEntry(j);});}
  h+='<div class="kepala-panel"><div class="subttl" style="margin-top:0">'+icon('<path d="M12 3a9 9 0 100 18 9 9 0 000-18z"/>')+'Konfirmasi kepala lembaga (simulasi)</div>'+
    '<div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn pri" style="background:#22C55E;border-color:#22C55E" onclick="accSelesai()">'+icon('<path d="M9 11l3 3 8-8"/>')+'Konfirmasi selesai</button><button class="btn" onclick="revisiSelesai()">'+icon('<path d="M3 12a9 9 0 109-9 9 9 0 00-9 9zM3 12H1m4-4L3 6"/>')+'Belum selesai, lanjutkan</button></div></div>';
  return h;
}
function accSelesai(){var p=curProj();p.status='selesai';p.progress=100;render();}
function revisiSelesai(){curProj().status='aktif';render();}
function projSelesai(p){
  var h=projSummaryHead(p)+projTabs(p);
  if(state.projTab==='dokumen'){h+='<div class="paper"><div class="pbar"><span class="t">Nota Kesepakatan Project</span><button class="btn sm" onclick="window.print()">Cetak / Unduh PDF</button></div><div>'+projDoc(p)+'</div></div>';}
  else if(state.projTab==='fase'){h+=phaseTimeline(p);}
  else{h+='<div class="note">'+icon('<path d="M9 11l3 3 8-8"/>')+'<span>Project <b>selesai</b> dan diarsipkan. Riwayat tersimpan lengkap sebagai rekam jejak.</span></div><div class="sec-t">Riwayat update ('+p.journal.length+')</div>';if(!p.journal.length)h+='<div class="soon-box">Tidak ada jurnal.</div>';p.journal.forEach(function(j){h+=jEntry(j);});}
  return h;
}

/* dokumen rancang / nota kesepakatan */
function stamp(){return'<svg class="stamp" width="118" height="118" viewBox="0 0 118 118" xmlns="http://www.w3.org/2000/svg"><g fill="none" stroke="#1D4ED8" stroke-width="2.5"><circle cx="59" cy="59" r="54"/><circle cx="59" cy="59" r="45"/></g>'+
  '<text x="59" y="30" text-anchor="middle" font-size="8.5" font-weight="700" fill="#1D4ED8" letter-spacing="1">DISAHKAN</text>'+
  '<text x="59" y="56" text-anchor="middle" font-size="16" font-weight="800" fill="#1D4ED8">✓ SAH</text>'+
  '<text x="59" y="72" text-anchor="middle" font-size="8" font-weight="700" fill="#1D4ED8">PROJECT DITERIMA</text>'+
  '<text x="59" y="94" text-anchor="middle" font-size="6.5" font-weight="600" fill="#1D4ED8">KOORDINATOR PROJECT</text></svg>';}
function projDoc(p){
  var approved=['aktif','selesai_pending','selesai'].indexOf(p.status)>=0;
  var title=approved?'NOTA KESEPAKATAN PROJECT':'DOKUMEN RANCANG PROJECT';
  var phases=p.phases.map(function(f,i){return'<tr><td>'+(i+1)+'</td><td>'+em(f.nama)+'</td><td>'+esc(fmtD(f.mulai,1)||'-')+' – '+esc(fmtD(f.selesai,1)||'-')+'</td><td>'+esc(f.deskripsi||'')+'</td></tr>';}).join('')||'<tr><td colspan="4" class="empty">—</td></tr>';
  var team=p.team.filter(function(t){return filled(t.nama);}).map(function(t){return'<tr><td>'+em(t.nama)+'</td><td>'+esc(t.role||'')+'</td><td>'+esc(t.kontak||'')+'</td></tr>';}).join('')||'<tr><td colspan="3" class="empty">—</td></tr>';
  var eq=p.equipment.filter(function(e){return filled(e.item);}).map(function(e){return'<tr><td>'+em(e.item)+'</td><td>'+esc(e.jenis||'')+'</td><td>'+esc(e.ket||'')+'</td></tr>';}).join('')||'<tr><td colspan="3" class="empty">—</td></tr>';
  var sig=approved?'<div class="sig" style="position:relative"><div><div style="margin-bottom:2px">Koordinator Project</div><div style="font-size:12px;color:var(--muted)">✓ Disetujui '+esc(p.approvedAt||'')+'</div><div class="ln"></div></div><div><div style="margin-bottom:2px">Kepala Lembaga</div><div style="font-size:12px;color:var(--muted)">✓ Mengesahkan</div><div class="ln"></div></div>'+stamp()+'</div>':'<p style="margin-top:28px;color:var(--muted);font-size:13px"><i>Dokumen ini masih menunggu persetujuan &amp; pengesahan kepala lembaga.</i></p>';
  return'<div class="sheet"><h2 class="dt">'+title+'</h2><p class="ds">'+esc(p.lembaga||LEMBAGA)+'</p>'+
    '<div class="kv"><span class="k">Nama Project</span><span>'+em(p.name)+'</span><span class="k">Tujuan</span><span>'+em(p.aim)+'</span><span class="k">Tenggat</span><span>'+em(fmtD(projDeadline(p),1))+'</span>'+(approved?'<span class="k">Disahkan</span><span>'+em(p.approvedAt)+'</span>':'')+'</div>'+
    '<h3 class="dh">A. Deskripsi</h3><p>'+em(p.description)+'</p>'+
    '<h3 class="dh">B. Alur Timeline / Fase</h3><table><thead><tr><th style="width:26px">No</th><th>Fase</th><th style="width:200px">Periode</th><th>Keterangan</th></tr></thead><tbody>'+phases+'</tbody></table>'+
    '<h3 class="dh">C. Tim yang Terlibat</h3><table><thead><tr><th>Nama</th><th>Peran</th><th>Kontak</th></tr></thead><tbody>'+team+'</tbody></table>'+
    '<h3 class="dh">D. Perlengkapan Dibutuhkan</h3><table><thead><tr><th>Item</th><th style="width:110px">Jenis</th><th>Keterangan</th></tr></thead><tbody>'+eq+'</tbody></table>'+
    sig+'</div>';
}


/* theme */
var THSVG={light:'<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/></svg>',dark:'<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1111.2 3 7 7 0 0021 12.8z"/></svg>',auto:'<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="12" rx="2"/><path d="M8 20h8M12 16v4"/></svg>'};
var THLBL={light:'Terang',dark:'Gelap',auto:'Auto'};
var _mq=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)');
function effTheme(){return state.theme==='auto'?((_mq&&_mq.matches)?'dark':'light'):state.theme;}
function applyTheme(){document.documentElement.setAttribute('data-theme',effTheme());
  var tb=document.getElementById('themebtn');if(tb)tb.innerHTML=THSVG[state.theme];
  var mb=document.querySelectorAll('.thememenu button');for(var i=0;i<mb.length;i++)mb[i].classList.toggle('on',mb[i].getAttribute('data-th')===state.theme);
  var bn=document.getElementById('bn-theme');if(bn)bn.innerHTML=THSVG[state.theme]+'<span>'+THLBL[state.theme]+'</span>';}
function setTheme(t){state.theme=t;applyTheme();var d=document.getElementById('themedrop');if(d)d.classList.remove('open');}
function cycleTheme(){var o=['light','dark','auto'];state.theme=o[(o.indexOf(state.theme)+1)%3];applyTheme();}
function toggleThemeMenu(e){if(e)e.stopPropagation();var d=document.getElementById('themedrop');if(d)d.classList.toggle('open');}
function openSearch(){var o=document.getElementById('searchov');if(!o)return;o.classList.add('open');var i=document.getElementById('searchinp');if(i){i.value='';doSearch('');setTimeout(function(){i.focus();},60);}}
function closeSearch(){var o=document.getElementById('searchov');if(o)o.classList.remove('open');}
function doSearch(q){q=norm(q);var res=[];
  state.events.forEach(function(e){if(!q||norm(e.judul).indexOf(q)>=0)res.push({c:'#6366F1',t:'Eventual',name:e.judul||'(tanpa judul)',sub:(e.jenis||'-')+' · '+e.status,fn:"openEv('"+e.id+"')"});});
  state.projects.forEach(function(p){if(!q||norm(p.name).indexOf(q)>=0)res.push({c:'#8B5CF6',t:'Strategis',name:p.name||'(tanpa nama)',sub:PSTAT[p.status].l,fn:"openProj('"+p.id+"')"});});
  var box=document.getElementById('searchres');if(!box)return;
  if(!res.length){box.innerHTML='<div class="empty" style="padding:14px">Tidak ada hasil'+(q?' untuk "'+esc(q)+'"':'')+'.</div>';return;}
  box.innerHTML=res.map(function(o){return'<button class="sres" onclick="closeSearch();'+o.fn+'"><span class="pchip" style="background:'+o.c+'1f;color:'+o.c+'">'+o.t+'</span><span style="flex:1;text-align:left"><b>'+esc(o.name)+'</b><br><span style="color:var(--muted);font-size:12px">'+esc(o.sub)+'</span></span>'+icon('<path d="M9 6l6 6-6 6"/>')+'</button>';}).join('');}
try{document.addEventListener('click',function(){var d=document.getElementById('themedrop');if(d)d.classList.remove('open');});}catch(e){}
function masuk(){var l=document.getElementById('login');if(l)l.style.display='none';window.scrollTo(0,0);}
try{_mq&&_mq.addEventListener('change',function(){if(state.theme==='auto')applyTheme();});}catch(e){}
applyTheme();
/* localStorage persist */
function saveState(){try{localStorage.setItem('projOS',JSON.stringify({events:state.events,projects:state.projects,years:state.years,ta:state.ta}));}catch(e){}}
function loadState(){try{var d=JSON.parse(localStorage.getItem('projOS')||'null');if(d){state.events=d.events||state.events;state.projects=d.projects||state.projects;state.years=d.years||state.years;state.ta=d.ta||state.ta;}}catch(e){}}
loadState();
setInterval(saveState,2000);
render();

</script>
</body>
</html>
